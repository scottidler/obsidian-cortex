vault:
  # root-path: ~/path/to/vault
  ignore:
    - ".git"
    - ".obsidian"
    - ".cortex"
    - "assets"
    - "attachments"
  protected:
    - "system/borg-ledger.md"
    - "system/borg-dashboard.md"

log-level: info

schema:
  domains: [ai, tech, football, work, writing, music, spanish, knowledge, resources, system]
  types: [youtube, article, github, social, book, video, research, daily, meeting, note, vocab, moc, link, poem, system]
  origins: [authored, assisted, generated]
  statuses: [unread, reading, reviewed, starred]
  methods: [http, telegram, clipboard, cli, manual]

actions:
  naming:
    style: lowercase-hyphenated
    max-length: 80
    exempt-patterns:
      - "^[\\p{Emoji}].*/$"

  frontmatter:
    required: [title, date, type, domain, origin, tags]
    exempt:
      daily: [domain]
    path-exempt:
      "inbox/**": [domain]
    type-fields:
      youtube: [source, creator, duration]
      video: [source, creator, duration]
      article: [source, creator]
      github: [source]
      social: [source]
      research: [source]
      book: [creator]
      meeting: [scope, company]
      link: [source]
    auto-title: true

  tags:
    style: lowercase-hyphenated
    canonical:
      - ai-llm
      - sre
      - kubernetes
      - football
      - obsidian
      - rust
      - python
      - nixos
      - writing
      - music
      - spanish
    aliases:
      ai: ai-llm
      ML: ai-llm
      ml: ai-llm
      k8s: kubernetes
      kube: kubernetes
      nix: nixos

  scope:
    rules:
      - match: { tags: [sre, dat, tatari, engprog] }
        set: { scope: work, company: tatari }
      - match: { source-contains: "granola" }
        set: { scope: work, confidential: true }

  linking:
    scan-for: [people, projects, concepts]
    entities:
      people: []
      projects: []

  intel:
    daily-note: true
    weekly-review: true
    fabric-patterns: [extract_wisdom, summarize]
    output-path: "system/ai-output"

  duplicates:
    threshold: 0.85
    same-type-only: false

  broken-links:
    check-wikilinks: true
    check-urls: false

state:
  cache-dir: ".cortex"

daemon:
  on-change:
    - lint
    - broken-links
  debounce-secs: 5
  watch: notify
  poll-interval: 300

migrations: []
  # Example: v2 field migration for straggler legacy notes
  # - name: v2-field-renames
  #   field-renames:
  #     url: source
  #     author: creator
  #     uploader: creator
  #     channel: creator
  #     duration_min: duration
  #     trace_id: trace
  #     folder: domain
  #   field-drops: [day, time, ww, ref]

llm:
  provider: claude
  model: claude-sonnet-4-6
  api-key: ANTHROPIC_API_KEY
